name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run frontend tests
        run: |
          cd frontend
          npm install
          npm run build
          npm run preview

  build_and_push_backend:
    name: Build and push backend
    runs-on: ubuntu-latest 
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_FOR_ECR_USER }} 
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY_FOR_ECR_USER }} 
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push docker image to Amazon ECR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.ECR_REGISTRY_URL }}/it-projects/telebox-backend:${{ github.sha }}

  build_and_push_frontend: 
    name: Build and push frontend
    runs-on: ubuntu-latest
    needs: test_backend_and_frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_FOR_ECR_USER }} 
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY_FOR_ECR_USER }} 
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push docker image to Amazon ECR
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.ECR_REGISTRY_URL }}/it-projects/telebox-frontend:${{ github.sha }}

  deploy:
    runs-on: self-hosted
    needs: [build_and_push_backend, build_and_push_frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_FOR_ECR_USER }} 
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY_FOR_ECR_USER }} 
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare app
        run: |
          mkdir -p /app
          cp -r $PWD/docker-compose.yml /app/docker-compose.yml
          cd /app

          cat > .env << EOF
          ECR_REGISTRY_URL=${{ secrets.ECR_REGISTRY_URL }}
          IMAGE_TAG=${{ github.sha }}
          DATABASE_URI=${{ secrets.DATABASE_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          BUCKET_NAME=${{ secrets.BUCKET_NAME }}
          BUCKET_REGION=${{ secrets.BUCKET_REGION }}
          ACCESS_KEY=${{ secrets.ACCESS_KEY }}
          SECRET_ACCESS_KEY=${{ secrets.SECRET_ACCESS_KEY }}
          PORT=${{ secrets.PORT }}
          EOF

      - name: Pull and deploy docker compose
        run: |
          docker compose down
          docker compose up -d


  
    